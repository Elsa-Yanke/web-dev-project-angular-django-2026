<div class="auth-wrapper">
  <div class="login-card">

    <!-- Tab switcher -->
    <div class="tabs">
      <button class="tab-btn" [class.active]="mode() === 'login'" (click)="switchMode('login')">Sign In</button>
      <button class="tab-btn" [class.active]="mode() === 'register'" (click)="switchMode('register')">Register</button>
    </div>

    <!-- ── LOGIN ── -->
    @if (mode() === 'login') {
      <h2>Welcome back</h2>
      <p>Sign in to your account</p>

      @if (loginError()) {
        <div class="error-msg">{{ loginError() }}</div>
      }

      <div class="form-group">
        <label>Username</label>
        <input type="text" [(ngModel)]="loginUsername" name="loginUsername" placeholder="Enter your username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="loginPassword" name="loginPassword" placeholder="••••••••">
      </div>
      <button type="button" class="btn-login" (click)="login()">Sign In</button>
    }

    <!-- ── REGISTER ── -->
    @if (mode() === 'register') {
      <h2>Create account</h2>
      <p>Join GameLib today</p>

      @if (regError()) {
        <div class="error-msg">{{ regError() }}</div>
      }
      @if (regSuccess()) {
        <div class="success-msg">{{ regSuccess() }}</div>
      }

      <div class="form-group">
        <label>Username</label>
        <input type="text" [(ngModel)]="regUsername" name="regUsername" placeholder="Choose a username">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="regEmail" name="regEmail" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="regPassword" name="regPassword" placeholder="Min. 8 characters">
      </div>
      <div class="form-group">
        <label>Confirm password</label>
        <input type="password" [(ngModel)]="regPassword2" name="regPassword2" placeholder="Repeat password">
      </div>
      <button type="button" class="btn-login" (click)="register()">Create Account</button>
    }

  </div>
</div>
